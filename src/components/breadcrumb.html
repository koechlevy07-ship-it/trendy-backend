<!-- Breadcrumb Navigation -->
<nav class="breadcrumb" aria-label="Breadcrumb" data-breadcrumb>
    <div class="container">
        <ol class="flex flex-wrap items-center gap-2 text-sm" role="list">
            <li>
                <a href="/" class="breadcrumb-item flex items-center gap-2 text-tertiary hover:text-luxury-gold transition-colors" aria-current="false">
                    <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <span>Home</span>
                </a>
            </li>
            
            <!-- Dynamic breadcrumbs will be inserted here by JS -->
            <li class="breadcrumb-separator" aria-hidden="true">
                <svg class="w-4 h-4 text-quaternary flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m6 9 6 6 6-6"/>
                </svg>
            </li>
            
            <li class="breadcrumb-current" aria-current="page">
                <span class="breadcrumb-item text-primary font-medium">Current Page</span>
            </li>
        </ol>
    </div>
</nav>

<script>
// Breadcrumb Component
class Breadcrumb {
    constructor() {
        this.breadcrumbNav = document.querySelector('[data-breadcrumb]');
        this.separator = this.breadcrumbNav?.querySelector('.breadcrumb-separator');
        this.current = this.breadcrumbNav?.querySelector('.breadcrumb-current');
        this.list = this.breadcrumbNav?.querySelector('ol');
        
        this.init();
    }
    
    init() {
        if (!this.breadcrumbNav) return;
        
        // Generate breadcrumbs from URL or page data
        this.generateFromURL();
        
        // Listen for page changes (if using SPA)
        window.addEventListener('popstate', () => this.generateFromURL());
    }
    
    generateFromURL() {
        const path = window.location.pathname;
        const segments = path.split('/').filter(Boolean);
        
        if (segments.length === 0) {
            this.hide();
            return;
        }
        
        this.show();
        this.render(segments);
    }
    
    render(segments) {
        if (!this.list) return;
        
        // Clear dynamic items (keep home and separator)
        const itemsToRemove = this.list.querySelectorAll('.breadcrumb-dynamic');
        itemsToRemove.forEach(item => item.remove());
        
        let currentPath = '';
        segments.forEach((segment, index) => {
            currentPath += '/' + segment;
            const isLast = index === segments.length - 1;
            const label = this.formatLabel(segment);
            
            const li = document.createElement('li');
            li.className = 'breadcrumb-dynamic';
            
            if (isLast) {
                li.innerHTML = `
                    <span class="breadcrumb-item text-primary font-medium" aria-current="page">${label}</span>
                `;
                li.setAttribute('aria-current', 'page');
            } else {
                li.innerHTML = `
                    <li class="breadcrumb-separator" aria-hidden="true">
                        <svg class="w-4 h-4 text-quaternary flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m6 9 6 6 6-6"/>
                        </svg>
                    </li>
                    <li class="breadcrumb-dynamic">
                        <a href="${currentPath}" class="breadcrumb-item flex items-center gap-2 text-tertiary hover:text-luxury-gold transition-colors">
                            ${label}
                        </a>
                    </li>
                `;
            }
            
            // Insert before current page item
            this.current?.parentElement?.before(li);
        });
    }
    
    formatLabel(segment) {
        const labels = {
            'women': 'Women',
            'men': 'Men',
            'kids': 'Kids',
            'sale': 'Sale',
            'new-arrivals': 'New Arrivals',
            'brands': 'Designers',
            'trenchcoats': 'Trenchcoats',
            'wardrobe': 'Wardrobe',
            'shoes': 'Shoes',
            'dresses': 'Dresses',
            'tops': 'Tops',
            'bottoms': 'Bottoms',
            'outerwear': 'Outerwear',
            'knitwear': 'Knitwear',
            'accessories': 'Accessories',
            'suits': 'Suits',
            'shirts': 'Shirts',
            'trousers': 'Trousers',
            'outerwear': 'Outerwear',
            'footwear': 'Footwear',
            'girls': 'Girls',
            'boys': 'Boys',
            'baby': 'Baby',
            'gift-cards': 'Gift Cards',
            'about': 'About Us',
            'contact': 'Contact',
            'faq': 'FAQ',
            'shipping': 'Shipping',
            'returns': 'Returns',
            'size-guide': 'Size Guide',
            'track-order': 'Track Order',
            'payment-methods': 'Payment Methods',
            'cart': 'Shopping Cart',
            'checkout': 'Checkout',
            'wishlist': 'Wishlist',
            'account': 'My Account',
            'orders': 'My Orders',
            'addresses': 'Addresses',
            'login': 'Login',
            'register': 'Register',
            'search': 'Search Results',
            'privacy': 'Privacy Policy',
            'terms': 'Terms of Service',
            'cookies': 'Cookie Policy',
            'accessibility': 'Accessibility',
            'sitemap': 'Sitemap'
        };
        
        return labels[segment] || segment.split('-').map(word => 
            word.charAt(0).toUpperCase() + word.slice(1)
        ).join(' ');
    }
    
    show() {
        this.breadcrumbNav?.classList.remove('hidden');
    }
    
    hide() {
        this.breadcrumbNav?.classList.add('hidden');
    }
    
    // Static method to set custom breadcrumbs
    static setCrumbs(crumbs) {
        const nav = document.querySelector('[data-breadcrumb]');
        if (!nav) return;
        
        const list = nav.querySelector('ol');
        const current = nav.querySelector('.breadcrumb-current');
        
        if (!list || !current) return;
        
        // Clear dynamic items
        list.querySelectorAll('.breadcrumb-dynamic').forEach(item => item.remove());
        
        crumbs.forEach((crumb, index) => {
            const isLast = index === crumbs.length - 1;
            const li = document.createElement('li');
            li.className = 'breadcrumb-dynamic';
            
            if (isLast) {
                li.innerHTML = `
                    <li class="breadcrumb-separator" aria-hidden="true">
                        <svg class="w-4 h-4 text-quaternary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m6 9 6 6 6-6"/>
                        </svg>
                    </li>
                    <li class="breadcrumb-dynamic">
                        <span class="breadcrumb-item text-primary font-medium" aria-current="page">${crumb.label}</span>
                    </li>
                `;
            } else {
                li.innerHTML = `
                    <li class="breadcrumb-separator" aria-hidden="true">
                        <svg class="w-4 h-4 text-quaternary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m6 9 6 6 6-6"/>
                        </svg>
                    </li>
                    <li class="breadcrumb-dynamic">
                        <a href="${crumb.url}" class="breadcrumb-item flex items-center gap-2 text-tertiary hover:text-luxury-gold transition-colors">
                            ${crumb.label}
                        </a>
                    </li>
                `;
            }
            
            current.parentElement?.before(li);
        });
    }
}

// Initialize on DOM ready
document.addEventListener('DOMContentLoaded', () => {
    window.breadcrumb = new Breadcrumb();
});

// Export for module systems
if (typeof module !== 'undefined' && module.exports) {
    module.exports = Breadcrumb;
}
</script>

<style>

    padding: var(--space-4) 0;
}

.breadcrumb ol {
    margin: 0;
    padding: 0;
    list-style: none;
}

.breadcrumb-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    color: var(--color-text-tertiary);
    font-size: var(--font-size-body-sm);
    text-decoration: none;
    white-space: nowrap;
    transition: color var(--transition-fast);
}

.breadcrumb-item:hover,
.breadcrumb-item:focus {
    color: var(--color-luxury-gold);
}

.breadcrumb-item:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus-ring);
    border-radius: var(--radius-sm);
}

.breadcrumb-separator {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.breadcrumb-current .breadcrumb-item {
    color: var(--color-text-primary);

}

    .breadcrumb ol {
        gap: var(--space-1);
    }
    
    .breadcrumb-item span {
        display: none;
    }
    
    .breadcrumb-current .breadcrumb-item span {
        display: inline;
    }
}

    .breadcrumb-item {

    }

</style>
