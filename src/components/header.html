<!-- Header Component -->
<header class="header" role="banner" data-header>
    <!-- Top Bar (Mobile Only) -->
    <div class="header-top-bar lg:hidden border-b border-border-gray bg-primary-white" data-top-bar>

                    aria-expanded="false"
                    aria-controls="mobile-nav-drawer"
                    data-hamburger

                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>

                        data-search-trigger

                        aria-label="Search products"

                        aria-label="Shopping cart, 0 items"
                        data-cart-trigger
                    >

                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <path d="M16 10a4 4 0 0 1 0 8"/>

                    </button>
                    
                    <!-- User Account -->
                    <div class="header-user relative" data-user-menu>

                            class="header-user-trigger flex items-center gap-2 p-2 rounded-full hover:bg-background-secondary transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-luxury-gold focus-visible:ring-offset-2"

                            aria-haspopup="true"

<style>
/* Header Styles */
.header {
    position: relative;
    z-index: 100;
}

/* Top Bar (Mobile) */
.header-top-bar {
    transition: transform var(--transition-normal), opacity var(--transition-normal);
}

.header-top-bar.hidden {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
}

.header-hamburger {
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Header Main (Desktop) */
.header-main {
    transition: transform var(--transition-normal), box-shadow var(--transition-normal), background var(--transition-normal);
}

.header-main.scrolled {
    box-shadow: var(--shadow-md);
    background: rgba(255, 255, 255, 0.98);
}

.header-main.hidden {
    transform: translateY(-100%);
}

/* Navigation Links */
.nav-link {
    position: relative;
}

.nav-link::after {
    content: '';
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: var(--color-luxury-gold);
    border-radius: 2px;
    transition: width var(--transition-normal);
}

.nav-link:hover::after,
.nav-link[aria-expanded="true"]::after {
    width: 80%;
}

/* Mega Menu Trigger Active State */
.nav-link[aria-expanded="true"] {
    color: var(--color-premium-black);
}

.nav-link[aria-expanded="true"] svg {
    transform: rotate(180deg);
}

/* Header Actions */
.header-actions {
    display: flex;
    align-items: center;
    gap: var(--space-1);
}

.header-search-trigger,
.header-search-trigger-desktop,
.header-cart-trigger,
.header-cart-trigger-desktop,
.header-wishlist-trigger,
.header-user-trigger {
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Cart Count Badge */
.cart-count,
.wishlist-count {
    transform-origin: center;
}

.cart-count.visible,
.wishlist-count.visible {
    opacity: 1;
    transform: scale(1);
}

/* User Dropdown */
.header-user {
    position: relative;
}

.header-user-trigger {
    display: flex;
    align-items: center;
    gap: var(--space-2);
}

.user-dropdown {
    min-width: 220px;
    margin-top: var(--space-3);
    padding: var(--space-2);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-dropdown);
}

.user-dropdown.open {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.dropdown-item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    width: 100%;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-lg);
    color: var(--color-text-secondary);
    font-size: var(--font-size-body-md);
    font-weight: var(--font-weight-medium);
    background: none;
    border: none;
    text-align: left;
    cursor: pointer;
    transition: all var(--transition-fast);
}

.dropdown-item:hover,
.dropdown-item:focus {
    background: var(--color-background-secondary);
    color: var(--color-premium-black);
}

.dropdown-item:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus-ring);
}

/* Announcement Bar Hidden State */
.announcement-bar.announcement-hidden + .header .header-top-bar {
    display: none;
}

/* Sticky Header Animation */
@keyframes slideDown {
    from {
        transform: translateY(-100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.header-main.sticky-animate {
    animation: slideDown var(--transition-normal) var(--ease-out);
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
    .header-main,
    .header-top-bar,
    .nav-link::after,
    .cart-count,
    .wishlist-count,
    .user-dropdown {
        transition: none;
        animation: none;
    }
}
</style>
