        </svg>
        Load More Products
    </button>
    <p class="text-caption text-tertiary mt-2" data-load-more-info>Showing 24 of 287 products</p>

<script>
// Pagination Component
class Pagination {
    constructor(container, options = {}) {
        this.container = typeof container === 'string' ? document.querySelector(container) : container;
        this.options = {
            totalPages: options.totalPages || 1,
            currentPage: options.currentPage || 1,
            onPageChange: options.onPageChange || (() => {}),
            showFirstLast: options.showFirstLast !== false,
            showPrevNext: options.showPrevNext !== false,
            maxVisiblePages: options.maxVisiblePages || 5,
            ...options
        };
        
        this.init();
    }
    
    init() {
        if (!this.container) return;
        this.render();
        this.bindEvents();
    }
    
    render() {
        const { totalPages, currentPage, showFirstLast, showPrevNext, maxVisiblePages } = this.options;
        
        if (totalPages <= 1) {
            this.container.innerHTML = '';
            return;
        }
        
        let html = '<div class="flex items-center justify-center gap-2">';
        
        // Previous Button
        if (showPrevNext) {
            html += `
                <button class="pagination-btn pagination-prev px-4 py-2 text-body-sm font-medium text-secondary bg-primary-white border border-border-gray rounded-lg hover:bg-background-secondary hover:text-premium-black hover:border-luxury-gold transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-luxury-gold ${currentPage === 1 ? 'disabled:opacity-50 disabled:cursor-not-allowed' : ''}" 
                        aria-label="Previous page" 
                        data-page="prev"
                        ${currentPage === 1 ? 'disabled' : ''}>
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    <span class="hidden sm:inline">Previous</span>
                </button>
            `;
        }
        
        // Page Numbers
        html += '<div class="pagination-pages flex items-center gap-1" role="group" aria-label="Page numbers" data-pages>';
        
        const pages = this.getVisiblePages(currentPage, totalPages, maxVisiblePages);
        
        if (showFirstLast && pages[0] > 1) {
            html += this.renderPageButton(1, currentPage === 1);
            if (pages[0] > 2) {
                html += '<span class="pagination-ellipsis px-2 text-tertiary" aria-hidden="true">…</span>';
            }
        }
        
        pages.forEach(page => {
            html += this.renderPageButton(page, currentPage === page);
        });
        
        if (showFirstLast && pages[pages.length - 1] < totalPages) {
            if (pages[pages.length - 1] < totalPages - 1) {
                html += '<span class="pagination-ellipsis px-2 text-tertiary" aria-hidden="true">…</span>';
            }
            html += this.renderPageButton(totalPages, currentPage === totalPages);
        }
        
        html += '</div>';
        
        // Next Button
        if (showPrevNext) {
            html += `
                <button class="pagination-btn pagination-next px-4 py-2 text-body-sm font-medium text-secondary bg-primary-white border border-border-gray rounded-lg hover:bg-background-secondary hover:text-premium-black hover:border-luxury-gold transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-luxury-gold ${currentPage === totalPages ? 'disabled:opacity-50 disabled:cursor-not-allowed' : ''}" 
                        aria-label="Next page" 
                        data-page="next"
                        ${currentPage === totalPages ? 'disabled' : ''}>
                    <span class="hidden sm:inline">Next</span>
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
                </button>
            `;
        }
        
        html += '</div>';
        
        // Results Info
        html += `
            <div class="pagination-info hidden md:flex items-center justify-center gap-4 mt-4 text-body-sm text-tertiary" data-pagination-info>
                <span>Showing <strong>${this.options.startItem || 1}-${this.options.endItem || 24}</strong> of <strong>${this.options.totalItems || 0}</strong> products</span>
                <div class="pagination-per-page flex items-center gap-2">
                    <label for="per-page" class="font-medium">Per page:</label>
                    <select id="per-page" class="select select-sm w-auto px-3 py-1.5 text-body-sm bg-primary-white border border-border-gray rounded-lg focus:border-luxury-gold focus:ring-2 focus:ring-primary-focus focus:outline-none" aria-label="Results per page">
                        <option value="12">12</option>
                        <option value="24" ${this.options.perPage === 24 ? 'selected' : ''}>24</option>
                        <option value="48" ${this.options.perPage === 48 ? 'selected' : ''}>48</option>
                        <option value="96" ${this.options.perPage === 96 ? 'selected' : ''}>96</option>
                    </select>
                </div>
            </div>
        `;
        
        this.container.innerHTML = html;
    }
    
    renderPageButton(page, isActive) {
        return `
            <button class="pagination-page w-10 h-10 flex items-center justify-center text-body-sm font-medium ${isActive ? 'text-primary-white bg-luxury-gold' : 'text-secondary bg-primary-white border border-border-gray'} rounded-lg ${isActive ? 'focus-visible:ring-2 focus-visible:ring-luxury-gold focus-visible:ring-offset-2' : 'hover:bg-background-secondary hover:text-premium-black hover:border-luxury-gold transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-luxury-gold'}" 
                    aria-label="Page ${page}" 
                    ${isActive ? 'aria-current="page"' : ''} 
                    data-page="${page}">
                ${page}
            </button>
        `;
    }
    
    getVisiblePages(currentPage, totalPages, maxVisible) {
        const pages = [];
        const half = Math.floor(maxVisible / 2);
        
        let start = Math.max(1, currentPage - half);
        let end = Math.min(totalPages, start + maxVisible - 1);
        
        if (end - start + 1 < maxVisible) {
            start = Math.max(1, end - maxVisible + 1);
        }
        
        for (let i = start; i <= end; i++) {
            pages.push(i);
        }
        
        return pages;
    }
    
    bindEvents() {
        this.container.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-page]');
            if (!btn) return;
            
            const page = btn.dataset.page;
            if (page === 'prev') {
                this.goToPage(this.options.currentPage - 1);
            } else if (page === 'next') {
                this.goToPage(this.options.currentPage + 1);
            } else {
                this.goToPage(parseInt(page, 10));
            }
        });
        
        // Per page change
        const perPageSelect = this.container.querySelector('#per-page');
        if (perPageSelect) {
            perPageSelect.addEventListener('change', (e) => {
                this.options.onPerPageChange?.(parseInt(e.target.value, 10));
            });
        }
    }
    
    goToPage(page) {
        const { currentPage, totalPages, onPageChange } = this.options;
        
        if (page < 1 || page > totalPages || page === currentPage) return;
        
        this.options.currentPage = page;
        onPageChange(page);
        this.render();
    }
    
    update(options) {
        this.options = { ...this.options, ...options };
        this.render();
    }
    
    destroy() {
        this.container.innerHTML = '';
    }
}

// Auto-initialize pagination elements
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('[data-pagination]').forEach(el => {
        if (!el.dataset.paginationInitialized) {
            el.dataset.paginationInitialized = 'true';
            // Options would be passed via data attributes or defaults
        }
    });
});

// Export
if (typeof module !== 'undefined' && module.exports) {
    module.exports = Pagination;
}
</script>

</style>
