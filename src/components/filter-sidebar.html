                        <input type="checkbox" class="filter-checkbox w-4 h-4 rounded border-border-gray text-luxury-gold focus:ring-2 focus:ring-primary-focus focus:ring-offset-2" value="50" name="discount">
                        <span class="filter-label text-body-sm text-secondary group-hover:text-luxury-gold transition-colors">50% & Up</span>

        <!-- Active Filters Summary -->
        <div class="filter-summary mt-8 pt-6 border-t border-border-gray hidden" data-filter-summary>
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-label font-semibold tracking-widest uppercase text-premium-black">Active Filters</h3>
                <button class="filter-clear-all text-caption font-semibold text-luxury-gold hover:text-luxury-gold-hover" data-filter-clear-all>Clear All</button>
            </div>
            <div class="filter-tags flex flex-wrap gap-2" data-filter-tags>
                <!-- Active filter tags will be inserted here -->
            </div>
        </div>
        
        <!-- Apply Filters (Mobile) -->
        <div class="filter-actions lg:hidden mt-6 pt-6 border-t border-border-gray flex gap-3">
            <button class="btn btn-outline btn-lg flex-1" data-filter-clear>Clear All</button>
            <button class="btn btn-primary btn-lg flex-1" data-filter-apply>Apply Filters</button>

</aside>

<!-- Mobile Filter Drawer -->
<div class="filter-drawer fixed inset-0 z-[9999] lg:hidden transform translate-x-full transition-transform duration-300 ease-out" role="dialog" aria-modal="true" aria-labelledby="drawer-filter-title" data-filter-drawer>
    <div class="filter-drawer-overlay absolute inset-0 bg-overlay-dark backdrop-blur-sm" data-filter-drawer-close></div>
    <div class="filter-drawer-panel absolute right-0 top-0 h-full w-full max-w-sm bg-primary-white shadow-xl flex flex-col">
        <header class="filter-drawer-header flex items-center justify-between p-4 border-b border-border-gray">
            <h2 id="drawer-filter-title" class="text-heading-sm font-heading font-semibold text-premium-black">Filters</h2>
            <button class="filter-drawer-close p-2 rounded-lg text-secondary hover:bg-background-secondary hover:text-premium-black transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-luxury-gold" aria-label="Close filters" data-filter-drawer-close>
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </header>
        <div class="filter-drawer-content flex-1 overflow-y-auto p-4">
            <!-- Filter sections would be cloned here -->
        </div>
        <footer class="filter-drawer-footer p-4 border-t border-border-gray flex gap-3">
            <button class="btn btn-outline btn-lg flex-1" data-filter-clear>Clear All</button>
            <button class="btn btn-primary btn-lg flex-1" data-filter-apply>Apply Filters</button>
        </footer>
    </div>
</div>

<!-- Filter Toggle Button (Mobile) -->
<button class="filter-toggle lg:hidden fixed bottom-20 right-4 z-50 btn btn-primary btn-lg shadow-lg flex items-center gap-2" aria-label="Open filters" aria-expanded="false" data-filter-toggle>
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M3 3h18v18H3z"/>
        <path d="M9 9h6v6H9z"/>
    </svg>
    <span class="hidden sm:inline">Filters</span>
    <span class="filter-toggle-count absolute -top-1 -right-1 w-5 h-5 bg-error-red text-primary-white text-[10px] font-bold rounded-full flex items-center justify-center hidden" aria-live="polite">0</span>
</button>

<script>
// Filter Sidebar Component
class FilterSidebar {
    constructor() {
        this.sidebar = document.querySelector('[data-filter-sidebar]');
        this.drawer = document.querySelector('[data-filter-drawer]');
        this.toggleBtn = document.querySelector('[data-filter-toggle]');
        this.sections = document.querySelectorAll('[data-filter-section]');
        this.activeFilters = new Map();
        this.init();
    }
    
    init() {
        if (!this.sidebar && !this.drawer) return;
        
        this.bindEvents();
        this.initToggles();
        this.initPriceSlider();
        this.initColorSwatches();
        this.initSizeChips();
        this.updateActiveFilters();
    }
    
    bindEvents() {
        // Toggle sections
        document.querySelectorAll('[data-filter-toggle]').forEach(btn => {
            btn.addEventListener('click', (e) => this.toggleSection(e.currentTarget));
        });
        
        // Checkbox changes
        document.querySelectorAll('.filter-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => this.handleCheckboxChange(e.currentTarget));
        });
        
        // Price inputs
        document.querySelectorAll('.filter-price-input').forEach(input => {
            input.addEventListener('change', (e) => this.handlePriceInputChange(e.currentTarget));
        });
        
        // Price sliders
        document.querySelectorAll('.slider').forEach(slider => {
            slider.addEventListener('input', (e) => this.handleSliderChange(e.currentTarget));
        });
        
        // Color swatches
        document.querySelectorAll('.filter-color-swatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => this.handleColorSelect(e.currentTarget));
        });
        
        // Size chips
        document.querySelectorAll('.filter-size-chip').forEach(chip => {
            chip.addEventListener('click', (e) => this.handleSizeSelect(e.currentTarget));
        });
        
        // Clear filters
        document.querySelectorAll('[data-filter-clear], [data-filter-clear-all]').forEach(btn => {
            btn.addEventListener('click', () => this.clearAllFilters());
        });
        
        // Apply filters (mobile)
        document.querySelectorAll('[data-filter-apply]').forEach(btn => {
            btn.addEventListener('click', () => this.applyFilters());
        });
        
        // Mobile drawer
        if (this.toggleBtn && this.drawer) {
            this.toggleBtn.addEventListener('click', () => this.openDrawer());
            this.drawer.querySelector('[data-filter-drawer-close]')?.addEventListener('click', () => this.closeDrawer());
            this.drawer.querySelector('[data-filter-drawer-close]')?.addEventListener('click', () => this.closeDrawer());
        }
        
        // Show more
        document.querySelectorAll('[data-filter-show-more]').forEach(btn => {
            btn.addEventListener('click', (e) => this.showMoreFilters(e.currentTarget));
        });
    }
    
    initToggles() {
        document.querySelectorAll('[data-filter-toggle]').forEach(btn => {
            const target = btn.dataset.filterToggle;
            const content = document.querySelector(`[data-filter-content="${target}"]`);
            const chevron = btn.querySelector('.filter-chevron');
            
            if (content && chevron) {
                // Check if content has active filters
                const hasActive = content.querySelector('input[type="checkbox"]:checked, .filter-color-swatch.active, .filter-size-chip.active');
                if (!hasActive) {
                    content.style.display = 'none';
                    chevron.style.transform = 'rotate(-90deg)';
                    btn.setAttribute('aria-expanded', 'false');
                }
            }
        });
    }
    
    toggleSection(btn) {
        const target = btn.dataset.filterToggle;
        const content = document.querySelector(`[data-filter-content="${target}"]`);
        const chevron = btn.querySelector('.filter-chevron');
        const isExpanded = btn.getAttribute('aria-expanded') === 'true';
        
        if (content) {
            content.style.display = isExpanded ? 'none' : 'block';
            btn.setAttribute('aria-expanded', !isExpanded);
        }
        
        if (chevron) {
            chevron.style.transform = isExpanded ? 'rotate(-90deg)' : 'rotate(0deg)';
        }
    }
    
    handleCheckboxChange(checkbox) {
        const filterType = checkbox.closest('[data-filter-category]')?.dataset.filterCategory || 'unknown';
        const value = checkbox.value;
        const label = checkbox.closest('.filter-option').querySelector('.filter-label')?.textContent?.trim() || value;
        
        if (checkbox.checked) {
            this.addActiveFilter(filterType, value, label);
        } else {
            this.removeActiveFilter(filterType, value);
        }
        
        this.updateActiveFilters();
        this.updateFilterCounts();
    }
    
    handlePriceInputChange(input) {
        const minInput = document.getElementById('price-min');
        const maxInput = document.getElementById('price-max');
        const minSlider = document.getElementById('price-slider-min');
        const maxSlider = document.getElementById('price-slider-max');
        
        const min = parseInt(minInput.value) || 0;
        const max = parseInt(maxInput.value) || 100000;
        
        if (min > max) {
            if (input === minInput) maxInput.value = min;
            else minInput.value = max;
        }
        
        this.updatePriceSliders(min, max);
        this.addActiveFilter('price', { min, max }, `KSh ${min.toLocaleString()} - KSh ${max.toLocaleString()}`);
        this.updateActiveFilters();
    }
    
    handleSliderChange(slider) {
        const minSlider = document.getElementById('price-slider-min');
        const maxSlider = document.getElementById('price-slider-max');
        const minInput = document.getElementById('price-min');
        const maxInput = document.getElementById('price-max');
        const range = document.querySelector('.slider-range');
        
        let min = parseInt(minSlider.value);
        let max = parseInt(maxSlider.value);
        
        if (min > max - 1000) {
            if (slider === minSlider) minSlider.value = max - 1000;
            else maxSlider.value = min + 1000;
        }
        
        min = parseInt(minSlider.value);
        max = parseInt(maxSlider.value);
        
        minInput.value = min;
        maxInput.value = max;
        
        this.updatePriceSliders(min, max);
        this.addActiveFilter('price', { min, max }, `KSh ${min.toLocaleString()} - KSh ${max.toLocaleString()}`);
        this.updateActiveFilters();
    }
    
    updatePriceSliders(min, max) {
        const minSlider = document.getElementById('price-slider-min');
        const maxSlider = document.getElementById('price-slider-max');
        const range = document.querySelector('.slider-range');
        const thumbMin = document.querySelector('.thumb-min');
        const thumbMax = document.querySelector('.thumb-max');
        const maxVal = 100000;
        
        const minPercent = (min / maxVal) * 100;
        const maxPercent = (max / maxVal) * 100;
        
        if (thumbMin) thumbMin.style.left = `${minPercent}%`;
        if (thumbMax) thumbMax.style.right = `${100 - maxPercent}%`;
        if (range) range.style.left = `${minPercent}%`;
        if (range) range.style.right = `${100 - maxPercent}%`;
    }
    
    handleColorSelect(swatch) {
        const color = swatch.dataset.color;
        const isActive = swatch.classList.toggle('active');
        
        if (isActive) {
            this.addActiveFilter('color', color, color.charAt(0).toUpperCase() + color.slice(1));
        } else {
            this.removeActiveFilter('color', color);
        }
        
        this.updateActiveFilters();
    }
    
    handleSizeSelect(chip) {
        const size = chip.dataset.size;
        const isActive = chip.classList.toggle('active');
        
        if (isActive) {
            this.addActiveFilter('size', size, size);
        } else {
            this.removeActiveFilter('size', size);
        }
        
        this.updateActiveFilters();
    }
    
    initPriceSlider() {
        // Initialize slider positions
        const minSlider = document.getElementById('price-slider-min');
        const maxSlider = document.getElementById('price-slider-max');
        
        if (minSlider && maxSlider) {
            this.updatePriceSliders(parseInt(minSlider.value), parseInt(maxSlider.value));
        }
    }
    
    initColorSwatches() {
        document.querySelectorAll('.filter-color-swatch').forEach(swatch => {
            // Check for pre-selected colors
            if (swatch.classList.contains('active')) {
                const color = swatch.dataset.color;
                this.addActiveFilter('color', color, color.charAt(0).toUpperCase() + color.slice(1));
            }
        });
    }
    
    initSizeChips() {
        document.querySelectorAll('.filter-size-chip').forEach(chip => {
            if (chip.classList.contains('active')) {
                const size = chip.dataset.size;
                this.addActiveFilter('size', size, size);
            }
        });
    }
    
    addActiveFilter(type, value, label) {
        const key = `${type}:${value}`;
        this.activeFilters.set(key, { type, value, label });
    }
    
    removeActiveFilter(type, value) {
        const key = `${type}:${value}`;
        this.activeFilters.delete(key);
    }
    
    clearAllFilters() {
        this.activeFilters.clear();
        
        // Reset all inputs
        document.querySelectorAll('.filter-checkbox').forEach(cb => cb.checked = false);
        document.querySelectorAll('.filter-color-swatch').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.filter-size-chip').forEach(c => c.classList.remove('active'));
        
        // Reset price
        const minInput = document.getElementById('price-min');
        const maxInput = document.getElementById('price-max');
        const minSlider = document.getElementById('price-slider-min');
        const maxSlider = document.getElementById('price-slider-max');
        
        if (minInput) minInput.value = '';
        if (maxInput) maxInput.value = '';
        if (minSlider) minSlider.value = 0;
        if (maxSlider) maxSlider.value = 100000;
        
        this.updatePriceSliders(0, 100000);
        
        this.updateActiveFilters();
        this.updateFilterCounts();
    }
    
    applyFilters() {
        // Dispatch custom event for parent to handle
        const filters = Object.fromEntries(this.activeFilters);
        this.sidebar?.dispatchEvent(new CustomEvent('filtersApplied', { detail: filters }));
        this.closeDrawer();
    }
    
    updateActiveFilters() {
        const summary = document.querySelector('[data-filter-summary]');
        const tagsContainer = document.querySelector('[data-filter-tags]');
        const mobileCount = document.querySelector('.filter-toggle-count');
        
        if (!summary || !tagsContainer) return;
        
        const hasFilters = this.activeFilters.size > 0;
        summary.classList.toggle('hidden', !hasFilters);
        
        // Update tags
        tagsContainer.innerHTML = '';
        this.activeFilters.forEach((filter, key) => {
            const tag = document.createElement('span');
            tag.className = 'filter-tag inline-flex items-center gap-1.5 px-3 py-1 text-caption font-medium bg-primary-light text-luxury-gold rounded-full';
            tag.innerHTML = `
                ${filter.label}
                <button class="filter-tag-remove p-0.5 rounded-full hover:bg-background-tertiary transition-colors" data-filter-tag-remove="${key}" aria-label="Remove ${filter.label} filter">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            `;
            tagsContainer.appendChild(tag);
        });
        
        // Add remove listeners
        tagsContainer.querySelectorAll('[data-filter-tag-remove]').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.dataset.filterTagRemove;
                this.removeActiveFilterByKey(key);
            });
        });
        
        // Update mobile count
        if (mobileCount) {
            const count = this.activeFilters.size;
            mobileCount.textContent = count;
            mobileCount.classList.toggle('hidden', count === 0);
        }
    }
    
    removeActiveFilterByKey(key) {
        const filter = this.activeFilters.get(key);
        if (filter) {
            this.removeActiveFilter(filter.type, filter.value);
            this.updateActiveFilters();
            this.updateFilterCounts();
            
            // Reset corresponding input
            const checkbox = document.querySelector(`.filter-checkbox[value="${filter.value}"][name="${filter.type}"]`);
            if (checkbox) checkbox.checked = false;
            
            const swatch = document.querySelector(`.filter-color-swatch[data-color="${filter.value}"]`);
            if (swatch) swatch.classList.remove('active');
            
            const chip = document.querySelector(`.filter-size-chip[data-size="${filter.value}"]`);
            if (chip) chip.classList.remove('active');
        }
    }
    
    updateFilterCounts() {
        // In a real app, this would fetch from API
        // For now, just update the UI counts if they exist
    }
    
    showMoreFilters(btn) {
        const target = btn.dataset.filterShowMore;
        const content = document.querySelector(`[data-filter-content="${target}"]`);
        if (content) {
            content.querySelectorAll('.filter-option.hidden').forEach(el => el.classList.remove('hidden'));
            btn.style.display = 'none';
        }
    }
    
    openDrawer() {
        if (this.drawer) {
            this.drawer.classList.remove('translate-x-full');
            document.body.style.overflow = 'hidden';
            this.toggleBtn?.setAttribute('aria-expanded', 'true');
        }
    }
    
    closeDrawer() {
        if (this.drawer) {
            this.drawer.classList.add('translate-x-full');
            document.body.style.overflow = '';
            this.toggleBtn?.setAttribute('aria-expanded', 'false');
        }
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    window.filterSidebar = new FilterSidebar();
});

if (typeof module !== 'undefined' && module.exports) {
    module.exports = FilterSidebar;
}
</script>
