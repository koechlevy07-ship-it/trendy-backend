<script>
// Sort Dropdown Component
class SortDropdown {
    constructor(container, options = {}) {
        this.container = typeof container === 'string' ? document.querySelector(container) : container;
        this.options = {
            defaultSort: options.defaultSort || 'newest',
            onSortChange: options.onSortChange || (() => {}),
            sorts: options.sorts || [
                { value: 'newest', label: 'Newest Arrivals' },
                { value: 'price-asc', label: 'Price: Low to High' },
                { value: 'price-desc', label: 'Price: High to Low' },
                { value: 'name-asc', label: 'Name: A to Z' },
                { value: 'name-desc', label: 'Name: Z to A' },
                { value: 'best-selling', label: 'Best Selling' },
                { value: 'top-rated', label: 'Top Rated' },
                { value: 'discount', label: 'Biggest Discount' }
            ],
            ...options
        };
        
        this.currentSort = this.options.defaultSort;
        this.isOpen = false;
        this.init();
    }
    
    init() {
        if (!this.container) return;
        
        this.trigger = this.container.querySelector('[data-sort-trigger]');
        this.menu = this.container.querySelector('[data-sort-menu]');
        this.label = this.container.querySelector('.sort-label');
        this.chevron = this.container.querySelector('.sort-chevron');
        this.options_list = this.container.querySelectorAll('[data-sort-value]');
        this.closeBtn = this.container.querySelector('[data-sort-close]');
        
        this.bindEvents();
        this.updateLabel();
    }
    
    bindEvents() {
        if (!this.trigger || !this.menu) return;
        
        // Toggle dropdown
        this.trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            this.toggle();
        });
        
        // Option selection
        this.options_list.forEach(option => {
            option.addEventListener('click', () => {
                this.select(option.dataset.sortValue);
            });
            
            option.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.select(option.dataset.sortValue);
                }
            });
        });
        
        // Close button (mobile)
        if (this.closeBtn) {
            this.closeBtn.addEventListener('click', () => this.close());
        }
        
        // Close on outside click
        document.addEventListener('click', (e) => {
            if (this.isOpen && !this.container.contains(e.target)) {
                this.close();
            }
        });
        
        // Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.isOpen) {
                this.close();
            }
        });
        
        // Trap focus in mobile menu
        this.menu.addEventListener('keydown', (e) => {
            if (e.key === 'Tab' && this.isOpen) {
                this.trapFocus(e);
            }
        });
    }
    
    toggle() {
        this.isOpen ? this.close() : this.open();
    }
    
    open() {
        this.isOpen = true;
        this.trigger.setAttribute('aria-expanded', 'true');
        this.menu.classList.remove('opacity-0', 'visibility-hidden', 'translate-y-2', 'translate-y-full');
        this.menu.classList.add('opacity-100', 'visibility-visible', 'translate-y-0');
        this.chevron?.style.transform = 'rotate(180deg)';
        
        // Focus first option
        const firstOption = this.menu.querySelector('[role="option"]');
        firstOption?.focus();
        
        // Trap focus for mobile
        if (this.menu.classList.contains('fixed')) {
            this.trapFocusInMenu();
        }
    }
    
    close() {
        this.isOpen = false;
        this.trigger.setAttribute('aria-expanded', 'false');
        this.menu.classList.add('opacity-0', 'visibility-hidden', 'translate-y-2');
        this.menu.classList.remove('opacity-100', 'visibility-visible', 'translate-y-0');
        this.chevron?.style.transform = 'rotate(0deg)';
        this.trigger.focus();
    }
    
    select(value) {
        const option = this.container.querySelector(`[data-sort-value="${value}"]`);
        if (!option) return;
        
        this.currentSort = value;
        
        // Update UI
        this.options_list.forEach(opt => {
            const isSelected = opt.dataset.sortValue === value;
            opt.setAttribute('aria-selected', isSelected);
            const check = opt.querySelector('svg');
            if (check) check.style.display = isSelected ? 'block' : 'none';
        });
        
        // Update trigger label
        const label = option.textContent.trim();
        this.updateLabel(label);
        
        // Close dropdown
        this.close();
        
        // Callback
        this.options.onSortChange(value, this.options.sorts.find(s => s.value === value));
    }
    
    updateLabel(label) {
        if (this.label) {
            this.label.textContent = label || `Sort by: ${this.options.sorts.find(s => s.value === this.currentSort)?.label || 'Newest'}`;
        }
    }
    
    trapFocus(e) {
        const focusable = this.menu.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        
        if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
        }
    }
    
    trapFocusInMenu() {
        const focusable = this.menu.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (focusable.length) focusable[0].focus();
    }
    
    getCurrentSort() {
        return this.currentSort;
    }
    
    setSort(value) {
        if (this.options.sorts.some(s => s.value === value)) {
            this.select(value);
        }
    }
    
    destroy() {
        this.container.innerHTML = '';
    }
}

// Auto-initialize sort dropdowns
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('[data-sort-dropdown]').forEach(el => {
        if (!el.dataset.sortInitialized) {
            el.dataset.sortInitialized = 'true';
            new SortDropdown(el);
        }
    });
    
    document.querySelectorAll('[data-sort-dropdown-compact]').forEach(el => {
        if (!el.dataset.sortInitialized) {
            el.dataset.sortInitialized = 'true';
            new SortDropdown(el);
        }
    });
    
    document.querySelectorAll('[data-sort-dropdown-mobile]').forEach(el => {
        if (!el.dataset.sortInitialized) {
            el.dataset.sortInitialized = 'true';
            new SortDropdown(el);
        }
    });
});

// Export
if (typeof module !== 'undefined' && module.exports) {
    module.exports = SortDropdown;
}
</script>

<style>
/* Sort Dropdown Styles */
.sort-dropdown {
    position: relative;
    display: inline-block;
}

.sort-trigger,
.sort-trigger-compact,
.sort-trigger-mobile {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    white-space: nowrap;
}

.sort-trigger:focus-visible,
.sort-trigger-compact:focus-visible,
.sort-trigger-mobile:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus-ring);
}

.sort-chevron {
    transition: transform var(--transition-fast);
}

.sort-dropdown[aria-expanded="true"] .sort-chevron,
.sort-dropdown-compact[aria-expanded="true"] .sort-chevron,
.sort-dropdown-mobile[aria-expanded="true"] .sort-chevron {
    transform: rotate(180deg);
}

/* Sort Menu */
.sort-menu {
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: var(--space-2);
    min-width: 224px;
    background: var(--color-primary-white);
    border: var(--border-width-1) solid var(--color-border-gray);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-dropdown);
    opacity: 0;
    visibility: hidden;
    transform: translateY(8px);
    transition: all var(--transition-fast) var(--ease-out);
    z-index: var(--z-index-dropdown);
}

.sort-dropdown[aria-expanded="true"] .sort-menu,
.sort-dropdown-compact[aria-expanded="true"] .sort-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.sort-dropdown-mobile[aria-expanded="true"] .sort-menu {
    transform: translateY(0);
}

.sort-menu > div {
    padding: var(--space-2);
}

/* Sort Options */
.sort-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-2.5) var(--space-3);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
}

.sort-option:hover {
    background: var(--color-background-secondary);
    color: var(--color-premium-black);
}

.sort-option:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus-ring);
}

.sort-option[aria-selected="true"] {
    background: var(--color-primary-light);
    color: var(--color-luxury-gold);
}

.sort-option[aria-selected="true"]:hover {
    background: var(--color-primary-light);
}

/* Mobile Sort Menu */
.sort-dropdown-mobile .sort-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
    box-shadow: var(--shadow-modal);
    max-height: 70vh;
    transform: translateY(100%);
}

.sort-dropdown-mobile[aria-expanded="true"] .sort-menu {
    transform: translateY(0);
}

/* Mobile Sort Options */
.sort-dropdown-mobile .sort-option {
    width: 100%;
    text-align: left;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-xl);
}

/* Compact Variant */
.sort-dropdown-compact .sort-menu {
    min-width: 192px;
}

.sort-dropdown-compact .sort-option {
    padding: var(--space-2) var(--space-3);
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
    .sort-menu,
    .sort-chevron,
    .sort-option {
        transition: none;
    }
}

/* High Contrast */
@media (prefers-contrast: high) {
    .sort-menu {
        border-width: 2px;
    }
    
    .sort-option[aria-selected="true"] {
        border: 2px solid currentColor;
        border-radius: var(--radius-lg);
    }
}
</style>
