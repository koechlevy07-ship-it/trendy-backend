<script>
// Skeleton Animation Controller
class SkeletonManager {
    constructor() {
        this.skeletons = document.querySelectorAll('[aria-hidden="true"] .skeleton-line, [aria-hidden="true"] .skeleton-card, [aria-hidden="true"] .skeleton-grid > *');
        this.reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        this.init();
    }
    
    init() {
        if (this.reducedMotion) {
            this.disableAnimations();
            return;
        }
        
        // Add animation class to all skeleton lines
        document.querySelectorAll('.skeleton-line').forEach(line => {
            line.classList.add('skeleton-wave');
        });
        
        // Observe for when content replaces skeletons
        this.observeContent();
    }
    
    disableAnimations() {
        document.querySelectorAll('.skeleton-line, .skeleton-wave, .skeleton-pulse').forEach(el => {
            el.style.animation = 'none';
            el.style.background = 'var(--color-background-tertiary)';
        });
    }
    
    observeContent() {
        // Watch for when real content replaces skeletons
        const observer = new MutationObserver((mutations) => {
            mutations.forEach(mutation => {
                if (mutation.type === 'childList') {
                    mutation.removedNodes.forEach(node => {
                        if (node.nodeType === 1 && (node.classList.contains('skeleton-card') || node.classList.contains('skeleton-line'))) {
                            // Skeleton was removed, content loaded
                            this.onContentLoaded();
                        }
                    });
                }
            });
        });
        
        observer.observe(document.body, { childList: true, subtree: true });
    }
    
    onContentLoaded() {
        // Could trigger entrance animations for new content
        document.querySelectorAll('.reveal:not(.visible)').forEach(el => {
            el.classList.add('visible');
        });
    }
    
    // Utility to show skeleton while loading
    static showSkeleton(container, type = 'card', count = 4) {
        const skeletons = {
            card: this.getCardSkeleton(),
            list: this.getListSkeleton(),
            table: this.getTableSkeleton(),
            form: this.getFormSkeleton(),
            hero: this.getHeroSkeleton()
        };
        
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            container.insertAdjacentHTML('beforeend', skeletons[type] || skeletons.card);
        }
    }
    
    static getCardSkeleton() {
        return `
            <article class="skeleton-card card card-product" aria-hidden="true">
                <div class="skeleton-product-image aspect-[3/4] w-full rounded-t-xl overflow-hidden bg-background-tertiary">
                    <div class="skeleton-line w-full h-full skeleton-wave"></div>
                </div>
                <div class="skeleton-product-badge absolute top-3 left-3">
                    <div class="skeleton-line w-20 h-5 rounded-full skeleton-wave"></div>
                </div>
                <button class="skeleton-wishlist absolute top-3 right-3 w-10 h-10 rounded-full bg-background-tertiary" aria-hidden="true">
                    <div class="skeleton-line w-full h-full skeleton-wave"></div>
                </button>
                <div class="skeleton-product-content p-4">
                    <div class="skeleton-line w-1/4 h-3 rounded mb-2 skeleton-wave"></div>
                    <div class="skeleton-line w-3/4 h-5 rounded mb-2 skeleton-wave"></div>
                    <div class="skeleton-line w-1/2 h-5 rounded mb-1 skeleton-wave"></div>
                    <div class="skeleton-line w-20 h-6 rounded skeleton-wave"></div>
                </div>
            </article>
        `;
    }
    
    static getListSkeleton() {
        return `
            <div class="skeleton-list-item flex items-center gap-4 p-4 bg-primary-white border border-border-gray rounded-xl" aria-hidden="true">
                <div class="skeleton-avatar w-14 h-14 rounded-full bg-background-tertiary flex-shrink-0">
                    <div class="skeleton-line w-full h-full skeleton-wave"></div>
                </div>
                <div class="skeleton-list-content flex-1 min-w-0">
                    <div class="skeleton-line w-3/4 h-4 rounded mb-2 skeleton-wave"></div>
                    <div class="skeleton-line w-1/2 h-3 rounded skeleton-wave"></div>
                </div>
                <div class="skeleton-line w-24 h-5 rounded flex-shrink-0 skeleton-wave"></div>
            </div>
        `;
    }
    
    static getTableSkeleton() {
        return `
            <tbody>
                <tr class="skeleton-tr">
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/2 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/3 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/4 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/5 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/6 h-4 rounded skeleton-wave"></div></td>
                </tr>
                <tr class="skeleton-tr">
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/2 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/3 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/4 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/5 h-4 rounded skeleton-wave"></div></td>
                    <td class="skeleton-td px-4 py-4"><div class="skeleton-line w-1/6 h-4 rounded skeleton-wave"></div></td>
                </tr>
            </tbody>
        `;
    }
    
    static getFormSkeleton() {
        return `
            <div class="skeleton-form-group">
                <div class="skeleton-line w-1/4 h-4 rounded mb-2 skeleton-wave"></div>
                <div class="skeleton-line w-full h-10 rounded skeleton-wave"></div>
            </div>
            <div class="skeleton-form-group">
                <div class="skeleton-line w-1/4 h-4 rounded mb-2 skeleton-wave"></div>
                <div class="skeleton-line w-full h-10 rounded skeleton-wave"></div>
            </div>
        `;
    }
    
    static getHeroSkeleton() {
        return `
            <section class="skeleton-hero aspect-video w-full rounded-2xl overflow-hidden relative bg-background-tertiary" aria-hidden="true">
                <div class="absolute inset-0">
                    <div class="skeleton-line w-full h-full skeleton-wave"></div>
                </div>
                <div class="absolute bottom-0 left-0 right-0 p-8 lg:p-16 bg-gradient-to-t from-premium-black/80 to-transparent">
                    <div class="max-w-3xl">
                        <div class="skeleton-line w-1/2 h-12 rounded mb-4 skeleton-wave"></div>
                        <div class="skeleton-line w-3/4 h-5 rounded mb-6 skeleton-wave"></div>
                        <div class="skeleton-line w-36 h-12 rounded skeleton-wave"></div>
                    </div>
                </div>
            </section>
        `;
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    window.skeletonManager = new SkeletonManager();
});

// Export
if (typeof module !== 'undefined' && module.exports) {
    module.exports = SkeletonManager;
}
</script>

<style>

}

/* Reduced Motion */
