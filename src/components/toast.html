<!-- Toast Notification Container -->
<div id="toast-container" class="toast-container fixed bottom-6 right-6 z-[10000] flex flex-col gap-3 pointer-events-none" role="region" aria-label="Notifications" aria-live="polite"></div>

<script>
// Toast Notification System
class ToastManager {
    constructor() {
        this.container = document.getElementById('toast-container');
        this.toasts = new Map();
        this.defaultDuration = 5000;
        this.init();
    }
    
    init() {
        if (!this.container) {
            this.container = document.createElement('div');
            this.container.id = 'toast-container';
            this.container.className = 'toast-container fixed bottom-6 right-6 z-[10000] flex flex-col gap-3 pointer-events-none';
            this.container.setAttribute('role', 'region');
            this.container.setAttribute('aria-label', 'Notifications');
            this.container.setAttribute('aria-live', 'polite');
            document.body.appendChild(this.container);
        }
        
        // Expose globally
        window.toast = this;
    }
    
    show(message, options = {}) {
        const {
            type = 'info',
            title = '',
            duration = this.defaultDuration,
            action = null,
            dismissible = true,
            persistent = false
        } = options;
        
        const id = 'toast-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        const toast = this.createToast(id, message, type, title, action, dismissible);
        
        this.container.appendChild(toast);
        this.toasts.set(id, { element: toast, timeout: null });
        
        // Trigger animation
        requestAnimationFrame(() => {
            toast.classList.add('toast-enter');
        });
        
        // Auto-dismiss
        if (!persistent && duration > 0) {
            const timeout = setTimeout(() => this.dismiss(id), duration);
            this.toasts.get(id).timeout = timeout;
        }
        
        // Pause on hover
        toast.addEventListener('mouseenter', () => this.pause(id));
        toast.addEventListener('mouseleave', () => this.resume(id));
        
        return id;
    }
    
    createToast(id, message, type, title, action, dismissible) {
        const toast = document.createElement('div');
        toast.id = id;
        toast.className = `toast toast-${type} pointer-events-auto w-full max-w-sm md:max-w-md animate-none`;
        toast.setAttribute('role', 'alert');
        toast.setAttribute('aria-live', type === 'error' ? 'assertive' : 'polite');
        
        const icons = {
            success: `<svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
            error: `<svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
            warning: `<svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
            info: `<svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`
        };
        
        const colors = {
            success: 'border-l-4 border-success-green bg-success-light',
            error: 'border-l-4 border-error-red bg-error-light',
            warning: 'border-l-4 border-warning-amber bg-warning-light',
            info: 'border-l-4 border-info-blue bg-info-light'
        };
        
        const iconColors = {
            success: 'text-success-green',
            error: 'text-error-red',
            warning: 'text-warning-amber',
            info: 'text-info-blue'
        };
        
        toast.innerHTML = `
            <div class="toast-content flex items-start gap-3 p-4 ${colors[type]} rounded-xl border border-border-gray shadow-toast">
                <div class="toast-icon ${iconColors[type]} flex-shrink-0 mt-0.5">
                    ${icons[type]}
                </div>
                <div class="toast-body flex-1 min-w-0">
                    ${title ? `<h4 class="toast-title font-semibold text-premium-black mb-1">${this.escapeHtml(title)}</h4>` : ''}
                    <p class="toast-message text-body-sm text-secondary">${this.escapeHtml(message)}</p>
                    ${action ? `
                        <div class="toast-action mt-3 pt-3 border-t border-border-gray">
                            <button class="toast-action-btn btn btn-text text-caption font-semibold" data-toast-action="${this.escapeHtml(action.label)}">
                                ${this.escapeHtml(action.label)}
                            </button>
                        </div>
                    ` : ''}
                </div>
                ${dismissible ? `
                    <button class="toast-close flex-shrink-0 p-1 rounded-full text-tertiary hover:text-premium-black hover:bg-background-tertiary transition-colors" aria-label="Dismiss notification">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                ` : ''}
            </div>
            <div class="toast-progress" style="--duration: ${duration}ms"></div>
        `;
        
        // Event listeners
        if (dismissible) {
            toast.querySelector('.toast-close').addEventListener('click', () => this.dismiss(id));
        }
        
        if (action) {
            toast.querySelector('.toast-action-btn').addEventListener('click', () => {
                if (action.onClick) action.onClick();
                if (!action.persist) this.dismiss(id);
            });
        }
        
        // Progress bar animation
        const progress = toast.querySelector('.toast-progress');
        if (progress && duration > 0) {
            progress.style.animation = `toast-progress ${duration}ms linear forwards`;
        }
        
        return toast;
    }
    
    dismiss(id) {
        const toastData = this.toasts.get(id);
        if (!toastData) return;
        
        const { element, timeout } = toastData;
        
        if (timeout) clearTimeout(timeout);
        
        element.classList.add('toast-exit');
        element.addEventListener('animationend', () => {
            element.remove();
            this.toasts.delete(id);
        }, { once: true });
    }
    
    pause(id) {
        const toastData = this.toasts.get(id);
        if (!toastData) return;
        
        const { element, timeout } = toastData;
        if (timeout) {
            clearTimeout(timeout);
            toastData.timeout = null;
        }
        element.querySelector('.toast-progress')?.style.setProperty('animation-play-state', 'paused');
    }
    
    resume(id) {
        const toastData = this.toasts.get(id);
        if (!toastData) return;
        
        const { element } = toastData;
        const remaining = this.getRemainingTime(element);
        
        if (remaining > 0) {
            const timeout = setTimeout(() => this.dismiss(id), remaining);
            toastData.timeout = timeout;
        }
        element.querySelector('.toast-progress')?.style.setProperty('animation-play-state', 'running');
    }
    
    getRemainingTime(element) {
        const progress = element.querySelector('.toast-progress');
        if (!progress) return 0;
        
        const computedStyle = window.getComputedStyle(progress);
        const animation = computedStyle.animation;
        
        // This is a simplified estimation
        return 0;
    }
    
    dismissAll() {
        this.toasts.forEach((_, id) => this.dismiss(id));
    }
    
    // Convenience methods
    success(message, options = {}) {
        return this.show(message, { ...options, type: 'success' });
    }
    
    error(message, options = {}) {
        return this.show(message, { ...options, type: 'error', duration: 8000 });
    }
    
    warning(message, options = {}) {
        return this.show(message, { ...options, type: 'warning' });
    }
    
    info(message, options = {}) {
        return this.show(message, { ...options, type: 'info' });
    }
    
    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
}

// Initialize on DOM ready
document.addEventListener('DOMContentLoaded', () => {
    window.toast = new ToastManager();
});

// Export for modules
if (typeof module !== 'undefined' && module.exports) {
    module.exports = ToastManager;
}
</script>

<style>
/* Toast Container */
.toast-container {
    max-width: 420px;
}

/* Toast Base */
.toast {
    opacity: 0;
    transform: translateX(120%) translateY(0);
    animation: none;
}

.toast-enter {
    animation: toast-enter var(--transition-normal) var(--ease-spring) forwards;
}

.toast-exit {
    animation: toast-exit var(--transition-fast) var(--ease-in) forwards;
}

@keyframes toast-enter {
    from {
        opacity: 0;
        transform: translateX(120%);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes toast-exit {
    from {
        opacity: 1;
        transform: translateX(0);
    }
    to {
        opacity: 0;
        transform: translateX(120%);
    }
}

/* Toast Content */
.toast-content {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
}

/* Progress Bar */
.toast-progress {
    height: 3px;
    border-radius: 0 0 var(--radius-xl) var(--radius-xl);
    background: currentColor;
    transform-origin: left center;
    animation: toast-progress var(--duration, 5000ms) linear forwards;
}

@keyframes toast-progress {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
}

/* Toast Variants */
.toast-success .toast-progress { color: var(--color-success-green); }
.toast-error .toast-progress { color: var(--color-error-red); }
.toast-warning .toast-progress { color: var(--color-warning-amber); }
.toast-info .toast-progress { color: var(--color-info-blue); }

/* Toast Body */
.toast-title {
    font-size: var(--font-size-body-sm);
    line-height: var(--line-height-tight);
}

.toast-message {
    font-size: var(--font-size-body-sm);
    line-height: var(--line-height-normal);
}

.toast-action {
    margin-top: var(--space-3);
    padding-top: var(--space-3);
}

.toast-action-btn {
    font-size: var(--font-size-caption);
    text-transform: uppercase;
    letter-spacing: var(--letter-spacing-wider);
}

/* Toast Close */
.toast-close {
    margin-top: -4px;
    margin-right: -4px;
}

.toast-close:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus-ring);
}

/* Mobile Stack */
@media (max-width: 480px) {
    .toast-container {
        left: var(--space-3);
        right: var(--space-3);
        bottom: var(--space-3);
        max-width: none;
    }
    
    .toast {
        min-width: 0;
        max-width: none;
    }
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
    .toast-enter,
    .toast-exit {
        animation: none !important;
    }
    
    .toast-enter {
        opacity: 1;
        transform: translateX(0);
    }
    
    .toast-exit {
        opacity: 0;
        transform: translateX(120%);
    }
    
    .toast-progress {
        animation: none !important;
    }
}

/* High Contrast */
@media (prefers-contrast: high) {
    .toast {
        border-width: 2px;
    }
}
</style>
