<script>
// WhatsApp Widget Controller
class WhatsAppWidget {
    constructor() {
        this.widget = document.querySelector('[data-whatsapp-widget]');
        this.toggle = document.querySelector('[data-whatsapp-toggle]');
        this.panel = document.querySelector('[data-whatsapp-panel]');
        this.minimize = document.querySelector('[data-whatsapp-minimize]');
        this.input = this.widget?.querySelector('input[type="text"]');
        this.sendBtn = this.widget?.querySelector('button[type="submit"]');
        this.isOpen = false;
        
        this.init();
    }
    
    init() {
        if (!this.widget) return;
        
        this.toggle?.addEventListener('click', () => this.togglePanel());
        this.minimize?.addEventListener('click', () => this.closePanel());
        
        // Close on overlay click
        this.widget.addEventListener('click', (e) => {
            if (e.target === this.widget) this.closePanel();
        });
        
        // Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.isOpen) this.closePanel();
        });
        
        // Send message
        this.sendBtn?.addEventListener('click', () => this.sendMessage());
        this.input?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.sendMessage();
        });
        
        // Track if user has interacted
        this.hasInteracted = localStorage.getItem('tw_whatsapp_interacted') === 'true';
        
        // Show after delay on product pages
        if (document.querySelector('[data-product-page]')) {
            setTimeout(() => this.show(), 45000);
        }
    }
    
    togglePanel() {
        this.isOpen ? this.closePanel() : this.openPanel();
    }
    
    openPanel() {
        this.isOpen = true;
        this.panel?.classList.remove('opacity-0', 'invisible', 'translate-y-4', 'pointer-events-none');
        this.panel?.classList.add('opacity-100', 'visible', 'translate-y-0');
        this.toggle?.setAttribute('aria-expanded', 'true');
        
        // Mark as interacted
        localStorage.setItem('tw_whatsapp_interacted', 'true');
    }
    
    closePanel() {
        this.isOpen = false;
        this.panel?.classList.add('opacity-0', 'invisible', 'translate-y-4', 'pointer-events-none');
        this.panel?.classList.remove('opacity-100', 'visible', 'translate-y-0');
        this.toggle?.setAttribute('aria-expanded', 'false');
    }
    
    show() {
        if (!this.hasInteracted) {
            this.widget.classList.remove('opacity-0', 'invisible', 'pointer-events-none');
            this.widget.classList.add('opacity-100', 'visible', 'pointer-events-auto');
        }
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    window.whatsappWidget = new WhatsAppWidget();
});

if (typeof module !== 'undefined' && module.exports) {
    module.exports = WhatsAppWidget;
}
</script>

.whatsapp-widget {

}

@keyframes whatsapp-pulse {
    0%, 100% { box-shadow: 0 4px 14px rgba(37, 211, 102, 0.4); }
    50% { box-shadow: 0 8px 25px rgba(37, 211, 102, 0.6); }
}

.whatsapp-panel {

.whatsapp-messages {

}

.whatsapp-messages::-webkit-scrollbar {

}

.whatsapp-messages::-webkit-scrollbar-track {

}

.whatsapp-messages::-webkit-scrollbar-thumb {

    border-radius: var(--radius-full);

.whatsapp-messages::-webkit-scrollbar-thumb:hover {
